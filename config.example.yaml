# job-hunter-ai 配置文件
# 复制此文件为 config.yaml 并填写你的配置

# ── 搜索条件 ──────────────────────────────────────
search:
  keywords:
    - "Python后端"
    - "Java开发"
    - "前端工程师"
  city: "上海"          # 城市名称，如：北京、上海、深圳、杭州
  salary_min: 15        # 最低薪资（K），0 表示不限
  salary_max: 50        # 最高薪资（K），0 表示不限
  experience: "不限"    # 经验要求：不限、应届、1-3年、3-5年、5-10年
  degree: "不限"        # 学历要求：不限、大专、本科、硕士、博士
  max_jobs: 15          # 每次最多抓取岗位数量（建议 10-20）
  daily_limit: 30       # 每日累计抓取上限，超过自动停止

# ── 推送配置 ──────────────────────────────────────
push:
  pushplus_token: ""    # PushPlus token，前往 https://www.pushplus.plus 获取
  push_hour: 9          # 每天推送时间（小时，24小时制）
  max_push: 10          # 每次最多推送岗位数量
  min_score: 60         # 最低匹配分数才推送（0-100，没有简历则全部推送）

# ── 简历路径 ──────────────────────────────────────
resume:
  path: "resume.md"     # 简历文件路径，留空则跳过匹配评分

# ── 数据库 ────────────────────────────────────────
database:
  path: "data/jobs.db"  # SQLite 数据库路径

# ── 爬虫配置 ──────────────────────────────────────
crawler:
  headless: true        # 无头模式（true=后台运行，false=显示浏览器窗口）
  timeout: 30           # 页面加载超时（秒）
  delay: 2              # 每次请求间隔（秒），太小容易被封

# ── LLM 配置 ──────────────────────────────────────
# 优先级：环境变量 > 此处配置 > ~/.openclaw/openclaw.json（OpenClaw 用户）
# 支持任何兼容 Anthropic SDK 的服务（官方 Claude、ppinfra 中转等）
llm:
  api_key: ""           # API Key，留空则从环境变量 LLM_API_KEY 读取
  base_url: ""          # API 地址，留空则使用官方 https://api.anthropic.com
                        # ppinfra 中转：https://api.ppinfra.com/anthropic
  model: "claude-3-5-sonnet-20241022"  # 模型名称
